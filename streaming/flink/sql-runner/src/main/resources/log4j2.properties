# Vendored verbatim from apache/flink-kubernetes-operator's own
# examples/flink-sql-runner-example (Apache-2.0). Only relevant for local
# `mvn exec:java`-style runs outside a real Flink cluster -- inside the
# actual FlinkDeployment pod, Flink's own bundled log4j config already
# governs logging, so this resource is included for fidelity to the
# vendored example, not because the deployed job depends on it.
rootLogger.level = INFO
rootLogger.appenderRef.test.ref = TestLogger

appender.testlogger.name = TestLogger
appender.testlogger.type = CONSOLE
appender.testlogger.target = SYSTEM_ERR
appender.testlogger.layout.type = PatternLayout
appender.testlogger.layout.pattern = %-4r [%t] %-5p %c %x - %m%n
