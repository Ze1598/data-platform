# Step 3: a minimal, one-shot job (sql-scripts/sales_events_sink.sql's
# current version is a single hardcoded INSERT, no Kafka source yet) --
# proves Flink can write into this platform's Polaris/MinIO warehouse
# before Step 4 wires in the real Kafka source and turns this into a
# genuinely continuous job.
#
# Driven by the vendored SqlRunner.java (see ../sql-runner/), not PyFlink
# -- no entryClass override needed, the shaded jar's own manifest already
# names org.apache.flink.examples.SqlRunner as Main-Class (see pom.xml's
# shade-plugin config). Credentials are hardcoded directly in the SQL
# script (see sql-scripts/sales_events_sink.sql for why), so this pod
# needs no Secret/envFrom.
#
# AWS_REGION/AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY/AWS_ENDPOINT_URL_S3
# as literal env vars: the exact same gotcha this repo already documented
# for Polaris (query-engine/polaris/deployment.yaml, Learnings.md) --
# confirmed live here too, not assumed by analogy: the TaskManager's own
# S3FileIO client (built fresh for actual data-file writes, separate from
# whatever the JobManager used for catalog/DDL operations) failed with
# "Unable to load region from any of the providers in the chain" despite
# the catalog's own 's3.region'/'s3.endpoint' properties being set --
# the AWS SDK v2 client doesn't pick those up at this layer, only real
# env vars (or system properties).
apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  name: sales-events-sink
  namespace: streaming
spec:
  image: data-platform-streaming-flink:latest
  imagePullPolicy: IfNotPresent
  flinkVersion: v2_1
  serviceAccount: flink
  flinkConfiguration:
    taskmanager.numberOfTaskSlots: "1"
    execution.checkpointing.interval: "10s"
    execution.checkpointing.mode: EXACTLY_ONCE
    state.checkpoints.dir: file:///flink-checkpoints
  podTemplate:
    spec:
      containers:
        - name: flink-main-container
          env:
            - name: AWS_REGION
              value: us-east-1
            - name: AWS_ACCESS_KEY_ID
              value: admin
            - name: AWS_SECRET_ACCESS_KEY
              value: password
            - name: AWS_ENDPOINT_URL_S3
              value: http://minio.query-engine.svc.cluster.local:9000
          volumeMounts:
            - name: checkpoints
              mountPath: /flink-checkpoints
      volumes:
        - name: checkpoints
          emptyDir: {}
  jobManager:
    resource:
      memory: "1024m"
      cpu: 0.5
  taskManager:
    resource:
      memory: "1024m"
      cpu: 0.5
  job:
    jarURI: local:///opt/flink/usrlib/sql-runner.jar
    args: ["/opt/flink/usrlib/sql-scripts/sales_events_sink.sql"]
    parallelism: 1
    upgradeMode: stateless
