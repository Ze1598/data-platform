# Dedicated ServiceAccount for the frontend Deployment -- previously ran
# as the namespace's shared `default` SA with zero RBAC. Needed now that
# frontend's own backend code makes real Kubernetes API calls into a
# DIFFERENT namespace (orchestration, to cooperatively wake Dagster off a
# KEDA scale-to-zero state -- see Backlog.md "Cooperative wake-up
# mechanism for Dagster from Streamlit" and
# orchestration/k8s/rbac-frontend-wake.yaml for the grant itself). A
# dedicated named identity keeps that cross-namespace grant explicit and
# scoped, rather than binding it to the shared `default` SA.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend
  namespace: frontend
