# NodePort (not plain ClusterIP): paired with the kind cluster's
# extraPortMappings (hostPort 5432 -> containerPort 30432), this lets host
# tools (Streamlit app run via `uv run`, a local psql client) keep
# connecting to localhost:5432 unchanged, while also being reachable
# in-cluster at postgres.metadata.svc.cluster.local:5432 for later phases.
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: metadata
spec:
  type: NodePort
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      nodePort: 30432
