apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: metadata
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-credentials
          # No requests/limits existed at all before this (confirmed live) --
          # Postgres stays always-on (foundational to everything else, see
          # Learnings.md's "Kubernetes scaling options compared" entry), but
          # still needs honest, correctly-sized values rather than being
          # invisible to the scheduler's capacity accounting. Initial
          # estimate, not measured against real load -- no metrics-server in
          # this cluster yet to observe against; worth tuning later the same
          # way Trino's own sizing was refined empirically, not guessed once.
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "platform", "-d", "platform_metadata"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "platform", "-d", "platform_metadata"]
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: init-scripts
          configMap:
            name: postgres-init-scripts
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
