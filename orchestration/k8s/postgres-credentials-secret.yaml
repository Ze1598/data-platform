# Same plaintext-for-local-convenience Secret as metadata/k8s/secret.yaml,
# duplicated into the orchestration namespace -- Secrets are namespace-
# scoped, and the in-cluster webserver/daemon/code-server Deployments below
# need POSTGRES_USER/PASSWORD (dagster_db's own storage config,
# dagster-incluster.yaml) the same way the metadata namespace's own
# consumers do.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: orchestration
type: Opaque
stringData:
  POSTGRES_USER: platform
  POSTGRES_PASSWORD: platform
  POSTGRES_DB: platform_metadata
