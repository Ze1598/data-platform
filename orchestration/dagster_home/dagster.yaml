# Local dev instance config (DAGSTER_HOME points here for `dagster dev`).
# Same content, byte-for-byte, is used for the in-cluster ConfigMap that
# K8sRunLauncher mounts into every launched run pod (see
# orchestration/k8s/dagster-instance-configmap.yaml) — both need to point
# at the SAME Postgres-backed run/event storage so a run started locally
# and executed in-cluster reports status back to one shared place. They
# resolve POSTGRES_HOST to different values (localhost here via NodePort;
# postgres.metadata.svc.cluster.local in-cluster, injected as a pod env
# var by the run launcher config) — that's the only difference.
#
# dagster-incluster.yaml (same directory) is this file's sibling for the
# in-cluster webserver/daemon Deployments (Roadmap.md "Master pipeline
# orchestration" -- in-cluster Dagster hosting) -- identical except
# load_incluster_config: true. Keep both in sync by hand when editing
# anything else in this file.
storage:
  postgres:
    postgres_db:
      hostname:
        env: POSTGRES_HOST
      username:
        env: POSTGRES_USER
      password:
        env: POSTGRES_PASSWORD
      db_name: dagster_db
      port:
        env: POSTGRES_PORT

# Every feed's pool (see extraction_assets.py: FEED_POOL = f"feed:{code}")
# defaults to a limit of 1 unless explicitly overridden — one run touching
# a given feed's data at a time, cross-run, not just within one run's own
# asset DAG. See Learnings.md for why: two runs' clean-write and
# staging-merge steps racing on the same Iceberg table isn't just slow,
# it's a real correctness bug (DELETE+INSERT isn't one atomic commit).
concurrency:
  pools:
    default_limit: 1

# Without this, a pool slot held by a crashed/cancelled run is never
# released — with default_limit: 1, a single stale claim would permanently
# block every future run of that feed. 300s is generous slack for a
# genuinely still-running step to finish before being assumed dead.
run_monitoring:
  enabled: true
  free_slots_after_run_end_seconds: 300

run_launcher:
  module: dagster_k8s.launcher
  class: K8sRunLauncher
  config:
    job_image: data-platform-orchestration:latest
    job_namespace: orchestration
    load_incluster_config: false
    instance_config_map: dagster-instance
    image_pull_policy: IfNotPresent
    # Required positionally by K8sRunLauncher's constructor even though the
    # config schema marks it optional — the ServiceAccount the *launched*
    # run pod runs as (unrelated to how the launcher itself authenticates,
    # which is via local kubeconfig per load_incluster_config: false above).
    # "default" is fine: run pods here only call Postgres/Trino, not the
    # k8s API.
    service_account_name: default
    # Kill a launched run's Job/Pod the moment it finishes, instead of
    # leaving it around for dagster_k8s's own default 24h
    # ttl_seconds_after_finished (DEFAULT_JOB_SPEC_CONFIG in the installed
    # dagster_k8s/job.py) -- confirmed live this project's own run pods
    # were still sitting around >22h later, well within that default
    # window, not stuck: the TTL was real, just too long for how often
    # this project rebuilds/reruns in a single session. 0 is the
    # documented Kubernetes value for "eligible for cleanup immediately,"
    # not a disabled/no-op sentinel. Trade-off: `kubectl logs` on a
    # completed run's pod stops being possible almost immediately after
    # it finishes -- Dagster's own Postgres-backed run/event storage
    # (what data_processing_runs and the webserver UI both already read)
    # is unaffected, this only removes the raw pod log stream.
    run_k8s_config:
      job_spec_config:
        ttl_seconds_after_finished: 0
    # Phase 9: financial_transactions' landing asset reads CSV files
    # scripts/generate_financial_reports.py drops into
    # data-lake/landing/financial_transactions/ on the host. The kind node
    # already bind-mounts ./data-lake -> /data-lake (platform/kind/kind-
    # cluster.yaml's extraMounts), but no pod mounted it until now -- this
    # is the first thing in the project to actually use that mount.
    volumes:
      - name: data-lake
        host_path:
          path: /data-lake
    volume_mounts:
      - name: data-lake
        mount_path: /data-lake
    env_vars:
      - "POSTGRES_HOST=postgres.metadata.svc.cluster.local"
      - "POSTGRES_USER"
      - "POSTGRES_PASSWORD"
      - "POSTGRES_PORT"
      - "TRINO_HOST=trino.query-engine.svc.cluster.local"
      - "TRINO_PORT=8080"
      # Phase 6: the real clean-layer write path (raw_to_clean, via
      # PyIceberg) needs to reach Polaris and MinIO directly, in addition
      # to Trino — Trino is still what dbt/staging use, but clean_sales
      # writes straight to the catalog.
      - "POLARIS_HOST=polaris.query-engine.svc.cluster.local"
      - "POLARIS_PORT=8181"
      - "MINIO_HOST=minio.query-engine.svc.cluster.local"
      - "MINIO_PORT=9000"
      # Phase 9: financial_transactions' landing asset needs a different
      # path locally (repo-relative) vs. in the launched pod (mounted at
      # the container root, see the volumes/volume_mounts above) -- same
      # local-vs-in-cluster split as every other env var here. Unset
      # locally, financial_assets.py falls back to a repo-relative path.
      - "DATA_LAKE_PATH=/data-lake"
      # master_pipeline's own pod calls back into the webserver's GraphQL
      # API to launch its child jobs (dagster_launch.py) -- from inside a
      # launched pod, "localhost" resolves to the pod itself, not the
      # webserver, so this points it at the in-cluster webserver Service
      # instead (orchestration/k8s/webserver-service.yaml). Every other
      # launched pod ignores these two vars; only master_pipeline's own op
      # reads them.
      - "DAGSTER_WEBSERVER_HOST=dagster-webserver.orchestration.svc.cluster.local"
      - "DAGSTER_WEBSERVER_PORT=3000"
