# Single-node kind cluster for local development.
#
# Single-node specifically: Trino's local-filesystem connector requires the
# storage path to be a mount shared across every cluster node — trivially
# true with exactly one node. See Roadmap.md "Kubernetes target".
#
# IMPORTANT: `kind create cluster --config platform/kind/kind-cluster.yaml`
# must be run from the repo root — the hostPath below is resolved relative
# to the current working directory at cluster-creation time.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: data-platform
nodes:
  - role: control-plane
    extraMounts:
      - hostPath: ./data-lake
        containerPath: /data-lake
    extraPortMappings:
      # Postgres, exposed via a NodePort Service (see metadata/k8s/service.yaml)
      # so host tools (e.g. the Phase 1 Streamlit app running via `uv run`,
      # or a local psql client) can keep connecting to localhost:5432
      # unchanged, even though Postgres now runs inside the cluster.
      - containerPort: 30432
        hostPort: 5432
        protocol: TCP
      # Trino, exposed via a NodePort Service (see query-engine/trino/ Helm
      # values) — host tools (Trino CLI/Python client for manual verification
      # now, dbt's profiles.yml from Phase 4 onward) reach it at localhost:8080.
      - containerPort: 30880
        hostPort: 8080
        protocol: TCP
      # Dagster webserver, exposed via a NodePort Service
      # (orchestration/k8s/webserver-service.yaml) now that it runs
      # in-cluster instead of as a local `dagster dev` process (Roadmap.md
      # "Master pipeline orchestration") — keeps localhost:3000 working for
      # the Dagit UI and every host-side script that already targets it
      # (trigger_schedule_run.py, trigger_master_pipeline.py,
      # verify-pipeline/verify-schedule), same reasoning as Postgres/Trino
      # above. Extra{PortMappings} only apply at cluster *creation* time --
      # an existing cluster needs a full recreate (`just smoketest`'s
      # nuke-and-rebuild) to pick this up, not a live edit.
      - containerPort: 30300
        hostPort: 3000
        protocol: TCP
      # Streamlit frontend, exposed via a NodePort Service
      # (frontend/k8s/service.yaml) now that it runs in-cluster instead of
      # a local `nohup streamlit run app.py` process (Roadmap.md
      # "Kubernetes Hosting Model") — keeps localhost:8501 working for a
      # browser, same reasoning as Postgres/Trino/Dagster's webserver
      # above. Extra{PortMappings} only apply at cluster *creation* time --
      # an existing cluster needs a full recreate to pick this up.
      - containerPort: 30501
        hostPort: 8501
        protocol: TCP
