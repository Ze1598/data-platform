name: "data_platform"
version: "1.0.0"
config-version: 2

profile: "data_platform"

model-paths: ["models"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  data_platform:
    staging:
      +materialized: incremental
      +incremental_strategy: merge
    model:
      # Type 1 dimensions and facts use the same merge pattern as staging
      # (see Roadmap.md "Model Layer: SCD Design"). int_*_with_deletes
      # intermediate models override this to `view` individually -- they're
      # cheap to recompute and always reflect current staging+clean state.
      +materialized: incremental
      +incremental_strategy: merge
