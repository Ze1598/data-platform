# Local dev sizing: single pod (coordinator doing double duty as worker) to
# fit a laptop-constrained kind cluster (~7-8GB total Docker memory, shared
# with Postgres, Polaris, MinIO, and Kubernetes system pods).
#
# Bumped from the original 1Gi/2Gi request/limit (maxHeapSize 1500M,
# maxMemoryPerNode 700MB) after a real stress test: a MERGE of 3M new rows
# into staging.financial_transactions OOMKilled the coordinator at 2Gi
# (Phase 9 stress test, see Learnings.md). 4Gi/2500MB gives real headroom
# for a several-million-row incremental load while still fitting
# comfortably in a ~7.6GB Docker Desktop VM alongside the rest of the
# stack. maxHeapSize is kept below the container memory limit (not equal
# to it) to leave room for the JVM's off-heap/native memory, direct
# buffers, and metaspace -- setting it equal to the container limit is a
# common way to get OOMKilled again despite raising the limit.
server:
  workers: 0

coordinator:
  jvm:
    # 4Gi/3000M/1800MB, not the original 2Gi/1500M/700MB: confirmed via a
    # real A/B test that the OOM at multi-million-row incremental scale
    # is NOT primarily caused by the old MERGE-based query shape --
    # reverting to the original sizing and rerunning under the new
    # insert/update-split rewrite (macros/insert_update_split.sql, no
    # MERGE at all) still OOMKilled Trino, this time on just ~1.3M rows.
    # This is a genuine "this data volume needs more memory than a
    # laptop-dev-sized single-node coordinator has" situation, not a
    # query-shape inefficiency that a rewrite alone fixes. See
    # Learnings.md.
    maxHeapSize: "3000M"
  config:
    nodeScheduler:
      # Lets the coordinator also execute query tasks, since we're running
      # with zero dedicated workers.
      includeCoordinator: true
    query:
      # Trino reserves ~30% of maxHeapSize as headroom automatically
      # (heap-headroom-per-node); maxMemoryPerNode + that headroom must fit
      # inside maxHeapSize or the coordinator refuses to start at all
      # ("Invalid memory configuration ... cannot be larger than the
      # available heap memory") -- hit for real setting this to 2500MB
      # against a 3000M heap (headroom alone was ~900MB, already over
      # budget together). 1800MB leaves clear margin under the ~2100MB
      # actually available after headroom.
      maxMemoryPerNode: "1800MB"
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      memory: "4Gi"

service:
  type: NodePort
  nodePort: 30880

# Injects MINIO_ROOT_USER/MINIO_ROOT_PASSWORD (query-engine/minio/secret.yaml)
# and POLARIS_OAUTH2_CREDENTIAL (query-engine/polaris/secret.yaml) as env
# vars on every Trino pod, so the catalog properties below can reference
# them via Trino's own `${ENV:NAME}` secrets-substitution syntax
# (https://trino.io/docs/current/security/secrets.html, on by default --
# no separate Trino config needed) instead of embedding the literal
# credential values directly in this tracked values.yaml. Same namespace
# (query-engine) as both Secrets, so no cross-namespace reference needed.
envFrom:
  - secretRef:
      name: minio-credentials
  - secretRef:
      name: polaris-credentials

# See query-engine/polaris (catalog config) and query-engine/minio (S3-compatible
# object storage standing in for Azure Blob Storage locally — see Roadmap.md
# for why this replaced the originally-planned local-filesystem/FILE storage
# type approach).
# vended-credentials-enabled=false is a permanent choice, not a workaround for
# lack of RBAC privileges (that part was fixed — see Learnings.md "Phase 3").
# The real reason: the catalog's storageConfigInfo has stsUnavailable=true
# (MinIO has no real STS), so when Trino requests vended credentials Polaris
# has nothing real to hand out — confirmed via "Credential vending was
# requested for table ..., but no credentials are available" on both plain
# reads and CREATE TABLE, even with full privileges granted. Static MinIO
# credentials below are the correct approach for this storage backend, not a
# temporary bypass.
# fs.native-s3 (not the legacy Hadoop-S3A fs.hadoop.enabled/hive.s3.* setup)
# — confirmed working now that Polaris's own S3FileIO endpoint bug is fixed
# (AWS_ENDPOINT_URL_S3 on the Polaris deployment); the earlier suspected
# Trino path-style-access bug was a red herring.
catalogs:
  iceberg: |
    connector.name=iceberg
    iceberg.catalog.type=rest
    iceberg.rest-catalog.uri=http://polaris.query-engine.svc.cluster.local:8181/api/catalog
    iceberg.rest-catalog.warehouse=data_platform
    iceberg.rest-catalog.security=OAUTH2
    iceberg.rest-catalog.oauth2.credential=${ENV:POLARIS_OAUTH2_CREDENTIAL}
    iceberg.rest-catalog.oauth2.scope=PRINCIPAL_ROLE:ALL
    iceberg.rest-catalog.vended-credentials-enabled=false
    fs.native-s3.enabled=true
    s3.endpoint=http://minio.query-engine.svc.cluster.local:9000
    s3.path-style-access=true
    s3.region=us-east-1
    s3.aws-access-key=${ENV:MINIO_ROOT_USER}
    s3.aws-secret-key=${ENV:MINIO_ROOT_PASSWORD}
